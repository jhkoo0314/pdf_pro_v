[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra
markers =
    unit: Fast unit tests for pure logic (e.g., share_engine, coverage/gap calc)
    contract: Schema/column/type/nullable contract tests for outputs
    integration: Integration tests across pipeline stages
    regression: Regression tests for known bug-prone scenarios
    e2e: End-to-end workflow tests (tracking -> share -> KPI)
    smoke: Basic app and pipeline smoke checks
